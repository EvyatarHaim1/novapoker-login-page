<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="screen-orientation" content="landscape">
    <!-- Safari/iOS specific meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <!-- Security headers for cross-origin -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Nova Poker - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /*
         * NOTE: Removed CSS transform for landscape - it breaks iOS Safari completely.
         * The game app already handles orientation, just let the login page work normally.
         */

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 50%, #000000 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-img {
            width: 200px;
            height: auto;
        }

        .tagline {
            color: #eab308;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .login-card {
            background: linear-gradient(145deg, #1a1a1a 0%, #0a0a0a 100%);
            border-radius: 16px;
            border: 2px solid #ca8a04;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .card-header {
            background: linear-gradient(90deg, #ca8a04 0%, #eab308 50%, #ca8a04 100%);
            padding: 15px;
            text-align: center;
        }

        .card-header h2 {
            color: #000;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .card-body {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: #eab308;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .form-input {
            width: 100%;
            background: #0a0a0a;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-size: 1rem;
        }

        .form-input:focus {
            outline: none;
            border-color: #eab308;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-google {
            background: #fff;
            color: #333;
        }

        .btn-primary {
            background: linear-gradient(90deg, #ca8a04 0%, #eab308 100%);
            color: #000;
        }

        .btn-apple {
            background: #000;
            color: #fff;
            border: 1px solid #333;
        }

        .btn-apple svg {
            fill: #fff;
        }

        .btn-guest {
            background: transparent;
            color: #eab308;
            border: 2px solid #ca8a04;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 15px 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: #ca8a04;
        }

        .divider-text {
            padding: 0 15px;
            color: #ca8a04;
            font-size: 0.8rem;
        }

        .message {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 0.85rem;
            display: none;
        }

        .error { background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; color: #ef4444; }
        .success { background: rgba(34, 197, 94, 0.1); border: 1px solid #22c55e; color: #22c55e; }
        .message.show { display: block; }

        .card-footer {
            text-align: center;
            padding: 15px;
            border-top: 1px solid #222;
            color: #666;
            font-size: 0.85rem;
        }

        .card-footer a {
            color: #eab308;
            text-decoration: none;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading .spinner { display: block; }
        .loading .btn-text { display: none; }

        /* Initial loading state - shown before JS loads */
        .page-loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 50%, #000000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .page-loading.hidden { display: none; }
        .page-loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-top-color: #eab308;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .page-loading-text {
            color: #eab308;
            margin-top: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .page-error {
            color: #ef4444;
            text-align: center;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .page-error button {
            margin-top: 15px;
            padding: 10px 20px;
            background: #eab308;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Safari notch safe area */
        @supports (padding: max(0px)) {
            body {
                padding-left: max(20px, env(safe-area-inset-left));
                padding-right: max(20px, env(safe-area-inset-right));
                padding-top: max(20px, env(safe-area-inset-top));
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <!-- Loading overlay shown immediately -->
    <div id="page-loading" class="page-loading">
        <div class="page-loading-spinner"></div>
        <div class="page-loading-text">Loading Nova Poker...</div>
    </div>

    <div class="container" id="main-container" style="display: none;">
        <div class="logo-section">
            <img src="https://firebasestorage.googleapis.com/v0/b/naama-haim-meditations.appspot.com/o/logo.png?alt=media&token=24d81445-a66f-4b4a-b663-3e2f31ff826c" alt="Nova Poker" class="logo-img" onerror="this.style.display='none'">
            <p class="tagline">Play poker with real people against the house</p>
        </div>

        <div class="login-card">
            <div class="card-header">
                <h2 id="form-title">Welcome to Nova Poker</h2>
            </div>

            <div class="card-body">
                <div id="error-message" class="message error"></div>
                <div id="success-message" class="message success"></div>

                <button type="button" class="btn btn-google" id="btn-google" onclick="loginWithGoogle()">
                    <svg width="18" height="18" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    <span class="btn-text">Continue with Google</span>
                    <span class="spinner"></span>
                </button>

                <!-- Sign in with Apple - shown only on iOS -->
                <button type="button" class="btn btn-apple" id="btn-apple" onclick="loginWithApple()" style="display: none;">
                    <svg width="18" height="18" viewBox="0 0 24 24">
                        <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
                    </svg>
                    <span class="btn-text">Continue with Apple</span>
                    <span class="spinner"></span>
                </button>

                <div class="divider">
                    <div class="divider-line"></div>
                    <span class="divider-text">OR</span>
                    <div class="divider-line"></div>
                </div>

                <form id="login-form" onsubmit="loginWithEmail(event)">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" class="form-input" placeholder="your.email@example.com" required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="btn btn-primary" id="btn-login">
                        <span class="btn-text">Login</span>
                        <span class="spinner"></span>
                    </button>
                </form>

                <button type="button" class="btn btn-guest" id="btn-guest" onclick="loginAsGuest()">
                    <span class="btn-text">Continue as Guest</span>
                    <span class="spinner"></span>
                </button>
            </div>

            <div class="card-footer">
                <p>Don't have an account? <a href="#" onclick="switchToSignup()">Sign Up</a></p>
            </div>
        </div>
    </div>

    <!-- Load Supabase with multiple CDN fallbacks for iOS Safari compatibility -->
    <script>
        // Show error in loading overlay
        function showLoadingError(msg) {
            var loadingDiv = document.getElementById('page-loading');
            if (loadingDiv) {
                loadingDiv.innerHTML = '<div class="page-error">' +
                    '<p>Failed to load: ' + msg + '</p>' +
                    '<p style="font-size:12px;margin-top:10px;color:#888;">Browser: ' + navigator.userAgent.substring(0, 50) + '...</p>' +
                    '<button onclick="location.reload()">Retry</button>' +
                    '</div>';
            }
        }

        // Global error handler for uncaught errors
        window.onerror = function(msg, url, line, col, error) {
            console.error('Global error:', msg, url, line);
            // Don't show error for script load failures (handled by fallback)
            if (msg.indexOf('Script error') === -1) {
                showLoadingError(msg);
            }
            return false;
        };

        // CDN fallback loader for iOS compatibility
        var cdnUrls = [
            'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js',
            'https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js',
            'https://cdnjs.cloudflare.com/ajax/libs/supabase-js/2.39.3/supabase.min.js'
        ];
        var cdnIndex = 0;
        var scriptLoadTimeout = null;

        function loadSupabaseScript() {
            if (cdnIndex >= cdnUrls.length) {
                showLoadingError('Could not load authentication library. Please check your internet connection and try again.');
                return;
            }

            console.log('Trying CDN ' + (cdnIndex + 1) + '/' + cdnUrls.length + ': ' + cdnUrls[cdnIndex]);

            var script = document.createElement('script');
            script.src = cdnUrls[cdnIndex];
            script.crossOrigin = 'anonymous';

            // Timeout for slow/blocked CDNs (5 seconds)
            scriptLoadTimeout = setTimeout(function() {
                console.log('CDN timeout, trying next...');
                cdnIndex++;
                loadSupabaseScript();
            }, 5000);

            script.onload = function() {
                clearTimeout(scriptLoadTimeout);
                console.log('Supabase loaded from: ' + cdnUrls[cdnIndex]);
            };

            script.onerror = function() {
                clearTimeout(scriptLoadTimeout);
                console.log('CDN failed: ' + cdnUrls[cdnIndex]);
                cdnIndex++;
                loadSupabaseScript();
            };

            document.head.appendChild(script);
        }

        // Start loading immediately
        loadSupabaseScript();
    </script>

    <script>
        // Configuration
        var SUPABASE_URL = 'https://auth.novapoker.app';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0anFveGRxcGRjeHJjcXdza3V1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0NTM1NjcsImV4cCI6MjA4MTAyOTU2N30.7SnUPGhtSkmaML_wDx_smmtrGyS4qiNHFk977_2YZ34';
        var UNITY_CALLBACK = 'novapoker://callback';

        var supabaseClient = null;
        var isSignupMode = false;

        // Try to lock screen orientation to landscape (not supported in Safari/iOS - will silently fail)
        function lockLandscape() {
            try {
                if (screen.orientation && typeof screen.orientation.lock === 'function') {
                    screen.orientation.lock('landscape').catch(function(e) {
                        // Expected to fail on Safari/iOS - this is OK
                        console.log('Orientation lock not supported:', e.message);
                    });
                }
            } catch (e) {
                // Safari may throw on accessing screen.orientation
                console.log('Orientation API not available');
            }
        }

        // Hide loading overlay and show main content
        function hideLoading() {
            var loadingDiv = document.getElementById('page-loading');
            var mainContainer = document.getElementById('main-container');
            if (loadingDiv) loadingDiv.classList.add('hidden');
            if (mainContainer) mainContainer.style.display = 'block';
        }

        // Initialize on page load - wait for Supabase to be available
        var initAttempts = 0;
        var maxInitAttempts = 50; // 10 seconds max wait (50 * 200ms)

        window.onload = function() {
            console.log('Page loaded, initializing...');
            console.log('User Agent:', navigator.userAgent);
            console.log('Full URL:', window.location.href);
            console.log('Hash:', window.location.hash);
            console.log('Search:', window.location.search);
            lockLandscape();

            // Wait for Supabase to load (CDN may be slow on iOS)
            waitForSupabase();
        };

        function waitForSupabase() {
            initAttempts++;
            if (typeof window.supabase !== 'undefined') {
                console.log('Supabase available after ' + initAttempts + ' attempts');
                initializeApp();
            } else if (initAttempts < maxInitAttempts) {
                setTimeout(waitForSupabase, 200);
            } else {
                console.error('Supabase never loaded after ' + initAttempts + ' attempts');
                showLoadingError('Authentication library failed to load. Please check your connection and try again.');
            }
        }

        async function initializeApp() {
            try {
                if (typeof window.supabase === 'undefined') {
                    showLoadingError('Supabase library not available.');
                    return;
                }

                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('Supabase client initialized successfully');

                // Check if this is a logout request - clear any cached session BEFORE showing UI
                var urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('logout') === 'true') {
                    console.log('Logout parameter detected - clearing cached session (waiting for completion)');
                    try {
                        await supabaseClient.auth.signOut();
                        console.log('Signout completed successfully');
                    } catch (e) {
                        console.log('Signout error (non-fatal):', e);
                    }
                    // Clear the logout param from URL to prevent loop
                    if (window.history && window.history.replaceState) {
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                }

                // Show main UI only after signOut is complete
                hideLoading();

                // Check for OAuth callback in URL hash
                var hash = window.location.hash;
                if (hash && hash.length > 1) {
                    console.log('Hash detected:', hash);
                    var hashParams = new URLSearchParams(hash.substring(1));

                    // Check for OAuth error first
                    var error = hashParams.get('error');
                    if (error) {
                        var errorDescription = hashParams.get('error_description') || error;
                        console.error('OAuth error:', error, errorDescription);
                        showError('Login failed: ' + decodeURIComponent(errorDescription.replace(/\+/g, ' ')));
                        return;
                    }

                    // Check for access token
                    if (hashParams.get('access_token')) {
                        console.log('OAuth callback detected with access_token');
                        handleOAuthCallback(hash);
                        return;
                    }

                    console.log('Hash has no access_token or error:', hash);
                }

                // Also listen for auth state changes (skip auto-redirect on INITIAL_SESSION)
                var isInitialLoad = true;
                supabaseClient.auth.onAuthStateChange(function(event, session) {
                    console.log('Auth state changed:', event);
                    // Skip auto-redirect on initial page load - user must explicitly login
                    if (isInitialLoad && event === 'INITIAL_SESSION') {
                        console.log('Skipping auto-redirect on initial load');
                        isInitialLoad = false;
                        return;
                    }
                    isInitialLoad = false;
                    if (event === 'SIGNED_IN' && session && session.user) {
                        redirectToUnity(session, session.user);
                    }
                });
            } catch (e) {
                console.error('Initialization error:', e);
                showLoadingError('Failed to initialize: ' + e.message);
            }
        }

        function showError(msg) {
            var el = document.getElementById('error-message');
            el.textContent = msg;
            el.classList.add('show');
            document.getElementById('success-message').classList.remove('show');
        }

        function showSuccess(msg) {
            var el = document.getElementById('success-message');
            el.textContent = msg;
            el.classList.add('show');
            document.getElementById('error-message').classList.remove('show');
        }

        function hideMessages() {
            document.getElementById('error-message').classList.remove('show');
            document.getElementById('success-message').classList.remove('show');
        }

        function setLoading(btnId, loading) {
            var btn = document.getElementById(btnId);
            if (loading) {
                btn.classList.add('loading');
                btn.disabled = true;
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        var hasRedirected = false;

        function redirectToUnity(session, user) {
            // Guard against multiple redirects (onAuthStateChange can fire multiple times)
            if (hasRedirected) {
                console.log('Already redirected - ignoring duplicate call');
                return;
            }
            hasRedirected = true;

            var params = new URLSearchParams();
            params.set('access_token', session.access_token);
            params.set('refresh_token', session.refresh_token || '');
            params.set('user_id', user.id);
            params.set('email', user.email || '');

            if (user.user_metadata) {
                var displayName = user.user_metadata.full_name || user.user_metadata.name || '';
                if (displayName) params.set('name', displayName);
                if (user.user_metadata.avatar_url) params.set('avatar', user.user_metadata.avatar_url);
            }

            // For Apple Sign In: pass the provider so Unity knows
            if (user.app_metadata && user.app_metadata.provider === 'apple') {
                params.set('provider', 'apple');
            }

            var url = UNITY_CALLBACK + '?' + params.toString();
            console.log('Redirecting to Unity:', url);

            // Show a visual indicator that login succeeded (in case redirect is delayed)
            try {
                document.querySelector('.login-card').innerHTML =
                    '<div style="padding:40px;text-align:center;color:#eab308;">' +
                    '<h2>Login Successful!</h2>' +
                    '<p style="color:#ccc;margin-top:10px;">Returning to game...</p>' +
                    '</div>';
            } catch(e) {}

            // Primary redirect
            window.location.href = url;

            // Fallback: retry the redirect after a short delay in case the first attempt
            // was blocked by the browser (common on iOS ASWebAuthenticationSession)
            setTimeout(function() {
                if (!document.hidden) {
                    console.log('Retrying redirect to Unity (fallback)...');
                    window.location.replace(url);
                }
            }, 500);
        }

        // Show Apple button only on iOS/iPad
        function isAppleDevice() {
            var ua = navigator.userAgent || '';
            return /iPhone|iPad|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        }

        if (isAppleDevice()) {
            var appleBtn = document.getElementById('btn-apple');
            if (appleBtn) appleBtn.style.display = 'flex';
        }

        function loginWithApple() {
            console.log('Apple login clicked');
            hideMessages();
            setLoading('btn-apple', true);

            if (!supabaseClient) {
                showError('Supabase not initialized');
                setLoading('btn-apple', false);
                return;
            }

            // Apple Sign In runs through the same auth.novapoker.app custom domain as
            // Google. The Apple Service ID (com.shbstudiogames.novapoker.auth) has
            // https://auth.novapoker.app/auth/v1/callback registered as a Return URL, so
            // Apple accepts the redirect Supabase sends.
            supabaseClient.auth.signInWithOAuth({
                provider: 'apple',
                options: {
                    redirectTo: window.location.origin + window.location.pathname
                }
            }).then(function(response) {
                if (response.error) {
                    throw response.error;
                }
                console.log('Apple OAuth initiated, redirecting...');
            }).catch(function(e) {
                console.error('Apple login error:', e);
                showError(e.message || 'Apple login failed');
                setLoading('btn-apple', false);
            });
        }

        function loginWithGoogle() {
            console.log('Google login clicked');
            hideMessages();
            setLoading('btn-google', true);

            if (!supabaseClient) {
                showError('Supabase not initialized');
                setLoading('btn-google', false);
                return;
            }

            supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + window.location.pathname,
                    queryParams: {
                        prompt: 'select_account'
                    }
                }
            }).then(function(response) {
                if (response.error) {
                    throw response.error;
                }
                console.log('OAuth initiated, redirecting...');
            }).catch(function(e) {
                console.error('Google login error:', e);
                showError(e.message || 'Google login failed');
                setLoading('btn-google', false);
            });
        }

        function loginWithEmail(event) {
            event.preventDefault();
            console.log('Email login clicked');
            hideMessages();
            setLoading('btn-login', true);

            var email = document.getElementById('email').value;
            var password = document.getElementById('password').value;

            if (!supabaseClient) {
                showError('Supabase not initialized');
                setLoading('btn-login', false);
                return;
            }

            var authPromise;
            if (isSignupMode) {
                authPromise = supabaseClient.auth.signUp({ email: email, password: password });
            } else {
                authPromise = supabaseClient.auth.signInWithPassword({ email: email, password: password });
            }

            authPromise.then(function(result) {
                if (result.error) {
                    throw result.error;
                }

                if (isSignupMode && result.data.user && !result.data.session) {
                    showSuccess('Check your email for a confirmation link!');
                    setLoading('btn-login', false);
                    return;
                }

                if (result.data.session && result.data.user) {
                    redirectToUnity(result.data.session, result.data.user);
                }
            }).catch(function(e) {
                console.error('Email login error:', e);
                showError(e.message || 'Login failed');
                setLoading('btn-login', false);
            });
        }

        function loginAsGuest() {
            console.log('Guest login clicked');
            hideMessages();
            setLoading('btn-guest', true);

            try {
                // Create a local guest ID and redirect
                var guestId = null;
                try {
                    guestId = localStorage.getItem('nova_poker_guest_id');
                } catch (e) {
                    // localStorage may be blocked in Safari private mode
                    console.log('localStorage not available');
                }
                if (!guestId) {
                    guestId = 'guest_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
                    try {
                        localStorage.setItem('nova_poker_guest_id', guestId);
                    } catch (e) {
                        console.log('Could not save guest ID to localStorage');
                    }
                }

                var url = UNITY_CALLBACK + '?guest=true&guest_id=' + encodeURIComponent(guestId);
                console.log('Guest redirect:', url);
                window.location.href = url;

            } catch (e) {
                console.error('Guest login error:', e);
                showError(e.message || 'Guest login failed');
                setLoading('btn-guest', false);
            }
        }

        function switchToSignup() {
            isSignupMode = !isSignupMode;
            var title = document.getElementById('form-title');
            var btn = document.querySelector('#btn-login .btn-text');
            var footer = document.querySelector('.card-footer p');

            if (isSignupMode) {
                title.textContent = 'Create Account';
                btn.textContent = 'Sign Up';
                footer.innerHTML = 'Already have an account? <a href="#" onclick="switchToSignup()">Login</a>';
            } else {
                title.textContent = 'Welcome to Nova Poker';
                btn.textContent = 'Login';
                footer.innerHTML = 'Don\'t have an account? <a href="#" onclick="switchToSignup()">Sign Up</a>';
            }
            hideMessages();
        }

        function handleOAuthCallback(hash) {
            console.log('Processing OAuth callback...');

            try {
                // Parse tokens directly from the URL hash
                // Format: #access_token=...&expires_at=...&expires_in=...&refresh_token=...&token_type=bearer&type=signup
                var hashParams = new URLSearchParams(hash.substring(1));
                var accessToken = hashParams.get('access_token');
                var refreshToken = hashParams.get('refresh_token');

                if (!accessToken) {
                    showError('No access token found in callback');
                    return;
                }

                console.log('Access token found, setting session...');

                // Set a safety-net timeout: if setSession takes too long or fails silently,
                // redirect with the raw tokens anyway. This prevents the iOS
                // ASWebAuthenticationSession from staying stuck on the login page.
                var safetyTimeout = setTimeout(function() {
                    console.log('Safety timeout - redirecting with raw tokens...');
                    var fakeSession = {
                        access_token: accessToken,
                        refresh_token: refreshToken || ''
                    };
                    var user = decodeJwtUser(accessToken);
                    redirectToUnity(fakeSession, user);
                }, 3000);

                // Set the session in Supabase client
                supabaseClient.auth.setSession({
                    access_token: accessToken,
                    refresh_token: refreshToken || ''
                }).then(function(response) {
                    clearTimeout(safetyTimeout);

                    if (response.error) {
                        console.error('Error setting session:', response.error);
                        // Don't show error - redirect with raw tokens as fallback
                        console.log('Falling back to raw token redirect...');
                        var fakeSession = {
                            access_token: accessToken,
                            refresh_token: refreshToken || ''
                        };
                        var user = decodeJwtUser(accessToken);
                        redirectToUnity(fakeSession, user);
                        return;
                    }

                    var data = response.data;
                    if (data.session && data.user) {
                        console.log('Session set successfully, redirecting to Unity...');
                        redirectToUnity(data.session, data.user);
                    } else {
                        // Fallback: create a minimal session object from tokens
                        console.log('Using fallback redirect with parsed tokens...');
                        var fakeSession = {
                            access_token: accessToken,
                            refresh_token: refreshToken || ''
                        };

                        // Decode user info from JWT
                        var user = decodeJwtUser(accessToken);
                        redirectToUnity(fakeSession, user);
                    }
                }).catch(function(e) {
                    clearTimeout(safetyTimeout);
                    console.error('OAuth callback error:', e);
                    // Still try to redirect with raw tokens instead of just showing error
                    console.log('Error in setSession, falling back to raw token redirect...');
                    var fakeSession = {
                        access_token: accessToken,
                        refresh_token: refreshToken || ''
                    };
                    var user = decodeJwtUser(accessToken);
                    redirectToUnity(fakeSession, user);
                });
            } catch (e) {
                console.error('OAuth callback error:', e);
                showError('Authentication failed: ' + e.message);
            }
        }

        // Safari-compatible base64 decode (handles unicode)
        function base64UrlDecode(str) {
            try {
                // Replace URL-safe characters
                var base64 = str.replace(/-/g, '+').replace(/_/g, '/');
                // Pad with '=' if needed
                while (base64.length % 4) {
                    base64 += '=';
                }
                // Decode
                var decoded = atob(base64);
                // Handle UTF-8 (Safari fix)
                try {
                    return decodeURIComponent(escape(decoded));
                } catch (e) {
                    return decoded;
                }
            } catch (e) {
                console.error('base64 decode error:', e);
                return null;
            }
        }

        function decodeJwtUser(jwt) {
            try {
                var parts = jwt.split('.');
                if (parts.length !== 3) return { id: 'unknown', email: '' };

                var payloadStr = base64UrlDecode(parts[1]);
                if (!payloadStr) return { id: 'unknown', email: '' };

                var payload = JSON.parse(payloadStr);
                var userMeta = payload.user_metadata || {};
                return {
                    id: payload.sub || 'unknown',
                    email: payload.email || '',
                    user_metadata: {
                        full_name: userMeta.full_name || payload.name || '',
                        avatar_url: userMeta.avatar_url || payload.picture || ''
                    }
                };
            } catch (e) {
                console.error('JWT decode error:', e);
                return { id: 'unknown', email: '' };
            }
        }
    </script>
